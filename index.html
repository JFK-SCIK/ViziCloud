<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d0d">
  <meta name="description" content="Album photo partagé iCloud">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ViziCloud">
  <title>ViziCloud</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --surface2: #252525;
      --accent: #3b82f6;
      --accent2: #60a5fa;
      --text: #f1f5f9;
      --text-muted: #64748b;
      --border: rgba(255,255,255,0.08);
      --radius: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      overscroll-behavior: none;
    }

    /* ── HEADER ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13,13,13,0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0.875rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .logo {
      font-size: 1.375rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      flex: 1;
      user-select: none;
    }

    .badge {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      white-space: nowrap;
    }

    .album-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text);
      font-size: 0.75rem;
      font-weight: 500;
      padding: 0.25rem 0.6rem;
      outline: none;
      cursor: pointer;
    }

    .commit-ref {
      font-size: 0.6rem;
      font-weight: 400;
      font-family: 'Courier New', monospace;
      color: var(--text-muted);
      -webkit-text-fill-color: var(--text-muted);
      margin-left: 0.4rem;
      opacity: 0.65;
      vertical-align: middle;
    }

    /* ── STATUS BAR ── */
    .status-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.625rem 1.25rem;
      font-size: 0.8125rem;
      color: var(--text-muted);
      display: none;
      align-items: center;
      gap: 0.75rem;
    }
    .status-bar.visible { display: flex; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── GALLERY ── */
    .gallery {
      padding: 0.75rem;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
    }
    @media (max-width: 540px) {
      .gallery { grid-template-columns: repeat(2, 1fr); gap: 0.375rem; }
    }
    @media (min-width: 1100px) {
      .gallery { grid-template-columns: repeat(4, 1fr); }
    }

    .photo-card {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
      border-radius: 6px;
      background: var(--surface);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .photo-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: transparent;
      transition: background 0.18s;
    }
    .photo-card:hover::after { background: rgba(255,255,255,0.06); }

    .photo-card img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }
    .photo-card:hover img { transform: scale(1.04); }

    /* skeleton shimmer */
    .photo-card.skeleton {
      background: linear-gradient(90deg, var(--surface) 0%, var(--surface2) 50%, var(--surface) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .video-badge {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      background: rgba(0,0,0,0.6);
      border-radius: 50%;
      width: 46px; height: 46px;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
      pointer-events: none;
    }
    .video-badge svg { width: 18px; height: 18px; fill: white; margin-left: 3px; }

    /* ── PAGINATION ── */
    .pagination {
      padding: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }
    .page-info { font-size: 0.875rem; color: var(--text-muted); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover:not(:disabled) { background: var(--surface2); border-color: rgba(59,130,246,0.5); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(0,0,0,0.97);
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
    }
    .lightbox.open { opacity: 1; pointer-events: auto; }

    .lb-header {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0.75rem 1rem;
      flex-shrink: 0;
      padding-top: calc(0.75rem + env(safe-area-inset-top));
    }
    .lb-counter { font-size: 0.875rem; color: var(--text-muted); text-align: center; }
    .lb-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }

    .lb-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
      text-decoration: none;
    }
    .lb-btn:hover { background: var(--surface2); }
    .lb-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .lb-image-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      min-height: 0;
    }

    #lb-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
      opacity: 1;
      transition: opacity 0.18s;
    }
    #lb-img.fading { opacity: 0; }

    #lb-video {
      max-width: 100%;
      max-height: 100%;
      display: none;
      outline: none;
    }

    .lb-nav {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      width: 52px; height: 52px;
      background: rgba(0,0,0,0.45);
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: white;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
      z-index: 2;
    }
    .lb-nav:hover { background: rgba(255,255,255,0.12); }
    .lb-prev { left: 0.75rem; }
    .lb-next { right: 0.75rem; }
    .lb-nav svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .lb-nav[hidden] { display: none; }

    .lb-footer {
      padding: 0.75rem 1.25rem;
      padding-bottom: calc(0.75rem + env(safe-area-inset-bottom));
      flex-shrink: 0;
      text-align: center;
      min-height: 3rem;
    }
    .lb-caption { font-size: 0.9375rem; font-weight: 500; margin-bottom: 0.2rem; }
    .lb-date { font-size: 0.8125rem; color: var(--text-muted); }

    /* ── EMPTY / ERROR STATES ── */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }
    .empty-state h2 { font-size: 1.25rem; color: var(--text); margin-bottom: 0.5rem; }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: #dc2626;
      color: white;
      padding: 0.75rem 1.25rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      max-width: min(90vw, 420px);
      text-align: center;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; pointer-events: auto; }

    /* ── ICON BUTTON ── */
    .icon-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .icon-btn:hover { background: var(--surface2); color: var(--text); }
    .icon-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── SETTINGS ── */
    .settings-overlay {
      position: fixed; inset: 0; z-index: 400;
      background: rgba(0,0,0,0.55);
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .settings-overlay.open { opacity: 1; pointer-events: auto; }

    .settings-panel {
      position: fixed; top: 0; right: 0; bottom: 0; z-index: 401;
      width: min(320px, 90vw);
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
      overflow: hidden;
    }
    .settings-panel.open { transform: translateX(0); }

    .settings-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1rem 1rem 1.25rem;
      padding-top: calc(1rem + env(safe-area-inset-top));
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .settings-header h2 { font-size: 1.0625rem; font-weight: 700; color: var(--text); }

    .settings-body { flex: 1; overflow-y: auto; padding: 1rem 1.25rem; }
    .settings-section { margin-bottom: 1.75rem; }
    .settings-section h3 {
      font-size: 0.6875rem; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.09em;
      margin-bottom: 0.625rem;
    }
    .settings-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.625rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.875rem;
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-muted { font-size: 0.8125rem; color: var(--text-muted); font-family: 'Courier New', monospace; }
  </style>
</head>
<body>

<header>
  <span class="logo">
    <img src="icons/icon.svg" alt="" aria-hidden="true" style="width:28px;height:28px;vertical-align:middle;margin-right:0.4rem;border-radius:6px;">ViziCloud
    <span id="commit-ref" class="commit-ref"></span>
  </span>
  <select id="album-select" class="album-select" style="display:none" aria-label="Choisir un album"></select>
  <span class="badge" id="count-badge">Chargement…</span>
  <button class="icon-btn" id="settings-btn" title="Paramètres" aria-label="Ouvrir les paramètres">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>
</header>

<div class="status-bar" id="status-bar">
  <div class="spinner"></div>
  <span id="status-text">Connexion à iCloud…</span>
</div>

<main>
  <div class="gallery" id="gallery"></div>
  <div id="scroll-sentinel"></div>
</main>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Visionneuse photo">
  <div class="lb-header">
    <button class="lb-btn" id="lb-back" title="Retour" aria-label="Retour à la galerie">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="lb-counter" id="lb-counter"></span>
    <div class="lb-actions">
      <button class="lb-btn" id="lb-download-btn" title="Télécharger" aria-label="Télécharger">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <button class="lb-btn" id="lb-close" title="Fermer" aria-label="Fermer">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>

  <div class="lb-image-wrap" id="lb-wrap">
    <button class="lb-nav lb-prev" id="lb-prev" aria-label="Photo précédente">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <img id="lb-img" src="" alt="">
    <video id="lb-video" controls playsinline></video>
    <button class="lb-nav lb-next" id="lb-next" aria-label="Photo suivante">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

  <div class="lb-footer">
    <p class="lb-caption" id="lb-caption"></p>
    <p class="lb-date" id="lb-date"></p>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Settings panel -->
<div class="settings-overlay" id="settings-overlay"></div>
<aside class="settings-panel" id="settings-panel" aria-label="Paramètres">
  <div class="settings-header">
    <h2>Paramètres</h2>
    <button class="lb-btn" id="settings-close" aria-label="Fermer les paramètres">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="settings-body">
    <section class="settings-section">
      <h3>À propos</h3>
      <div class="settings-row">
        <span>Commit</span>
        <span class="settings-muted" id="settings-commit">—</span>
      </div>
    </section>
  </div>
</aside>

<script>
  'use strict';

  /* ── Config ───────────────────────────────────────────── */
  const PAGE_SIZE = 30;
  const USE_PROXY = !window.location.hostname.endsWith('github.io');
  let TOKEN   = '';
  let apiBase = '';

  /* ── State ────────────────────────────────────────────── */
  let allPhotos             = [];
  let urlCache              = {};   // guid → { thumb, full, isVideo }
  let loadedCount           = 0;
  let isLoadingBatch        = false;
  let lbIndex               = -1;
  let touchStartX           = 0;
  let touchIsZoom           = false;
  let lbPushedHistory       = false;
  let settingsPushedHistory = false;

  /* ── DOM ──────────────────────────────────────────────── */
  const $gallery         = document.getElementById('gallery');
  const $countBadge      = document.getElementById('count-badge');
  const $statusBar       = document.getElementById('status-bar');
  const $statusText      = document.getElementById('status-text');
  const $lightbox        = document.getElementById('lightbox');
  const $lbImg           = document.getElementById('lb-img');
  const $lbVideo         = document.getElementById('lb-video');
  const $lbCounter       = document.getElementById('lb-counter');
  const $lbCaption       = document.getElementById('lb-caption');
  const $lbDate          = document.getElementById('lb-date');
  const $lbPrev          = document.getElementById('lb-prev');
  const $lbNext          = document.getElementById('lb-next');
  const $toast           = document.getElementById('toast');
  const $settingsPanel   = document.getElementById('settings-panel');
  const $settingsOverlay = document.getElementById('settings-overlay');

  /* ── Helpers ──────────────────────────────────────────── */
  let toastTimer;
  function showToast(msg) {
    $toast.textContent = msg;
    $toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => $toast.classList.remove('show'), 4500);
  }

  function setLoading(on, msg = '') {
    $statusBar.classList.toggle('visible', on);
    if (msg) $statusText.textContent = msg;
  }

  function formatDate(ts) {
    if (!ts) return '';
    return new Date(ts * 1000).toLocaleDateString('fr-FR', {
      year: 'numeric', month: 'long', day: 'numeric'
    });
  }

  /* ── iCloud API ───────────────────────────────────────── */
  async function icloudPost(endpoint, body, isRetry = false) {
    const res = await fetch(apiBase + endpoint, {
      method: 'POST',
      body: JSON.stringify(body),
    });

    if (res.status === 330 && !isRetry) {
      try {
        const json = await res.json();
        const host = json['X-Apple-MMe-Host'];
        if (host) {
          apiBase = `https://${host}/${TOKEN}/sharedstreams/`;
          return icloudPost(endpoint, body, true);
        }
      } catch (_) { /* ignore parse errors on 330 */ }
    }

    if (!res.ok) throw new Error(`Erreur ${res.status}`);
    return res.json();
  }

  /* ── Derivative picker ────────────────────────────────── */
  function pickDerivKey(derivatives, largest) {
    const keys = Object.keys(derivatives).filter(k => derivatives[k]?.checksum);
    if (!keys.length) return null;
    return keys.reduce((best, k) => {
      const sizeK    = (derivatives[k].width || 0) * (derivatives[k].height || 0);
      const sizeBest = (derivatives[best].width || 0) * (derivatives[best].height || 0);
      return largest ? (sizeK > sizeBest ? k : best) : (sizeK < sizeBest ? k : best);
    });
  }

  /* ── Asset URL fetching ───────────────────────────────── */
  async function ensureUrls(guids) {
    const needed = guids.filter(g => !urlCache[g]);
    if (!needed.length) return;

    const result = await icloudPost('webasseturls', { photoGuids: needed });
    const items = result.items || {};

    for (const guid of needed) {
      const photo = allPhotos.find(p => p.photoGuid === guid);
      if (!photo) continue;
      const derivs = photo.derivatives || {};

      const buildUrl = (key) => {
        if (!key) return null;
        const checksum = derivs[key]?.checksum;
        const loc = items[checksum];
        if (!checksum || !loc) return null;
        return `https://${loc.url_location}${loc.url_path}`;
      };

      const isImage = (url) => url && !/\.(mp4|mov|m4v)/i.test(url.split('?')[0]);

      // Trier les dérivées par taille croissante
      const keys = Object.keys(derivs)
        .filter(k => derivs[k]?.checksum)
        .sort((a, b) =>
          (derivs[a].width||0) * (derivs[a].height||0) -
          (derivs[b].width||0) * (derivs[b].height||0)
        );

      const isVid = photo.mediaAssetType === 'video';

      // Thumbnail : plus petite dérivée qui est une image (pas .mp4)
      const thumbKey = keys.find(k => isImage(buildUrl(k))) ?? keys[0];
      // Full : pour les vidéos, préférer une dérivée vidéo (.mp4) ; sinon la plus grande
      const fullKey = isVid
        ? (keys.find(k => !isImage(buildUrl(k))) ?? keys[keys.length - 1])
        : keys[keys.length - 1];

      urlCache[guid] = {
        thumb:  buildUrl(thumbKey),
        full:   buildUrl(fullKey),
        isVideo: isVid,
      };
    }
  }

  /* ── Album config ─────────────────────────────────────── */
  async function loadAlbumConfig() {
    const albums = await fetch('./albums.json').then(r => r.json())
      .catch(() => [{ id: 'B0SJtdOXmeCgIG', name: 'Famille 2024', default: true }]);

    const saved   = localStorage.getItem('vc_album');
    const album   = albums.find(a => a.id === saved) || albums.find(a => a.default) || albums[0];
    TOKEN   = album.id;
    apiBase = USE_PROXY
      ? `/api/${TOKEN}/`
      : `https://p123-sharedstreams.icloud.com/${TOKEN}/sharedstreams/`;

    if (albums.length > 1) {
      const sel = document.getElementById('album-select');
      sel.style.display = '';
      sel.innerHTML = albums.map(a =>
        `<option value="${a.id}" ${a.id === TOKEN ? 'selected' : ''}>${a.name}</option>`
      ).join('');
      sel.addEventListener('change', () => {
        localStorage.setItem('vc_album', sel.value);
        location.reload();
      });
    }
  }

  /* ── Load all photos ──────────────────────────────────── */
  async function init() {
    fetch('./version.json').then(r => r.json()).then(data => {
      if (data.commit) {
        const el = document.getElementById('commit-ref');
        if (el) el.textContent = data.commit;
        const sc = document.getElementById('settings-commit');
        if (sc) sc.textContent = data.commit;
      }
    }).catch(() => {});

    await loadAlbumConfig();

    setLoading(true, "Connexion à iCloud…");
    try {
      const stream = await icloudPost('webstream', { streamCtag: null });
      allPhotos = (stream.photos || []).sort((a, b) => (b.dateCreated || 0) - (a.dateCreated || 0));
      if (stream.streamName) {
        const opt = document.querySelector(`#album-select option[value="${CSS.escape(TOKEN)}"]`);
        if (opt) opt.textContent = stream.streamName;
      }
      const n = allPhotos.length;
      $countBadge.textContent = `${n} photo${n > 1 ? 's' : ''}`;
      if (n === 0) {
        $gallery.innerHTML = '<div class="empty-state"><h2>Album vide</h2><p>Aucune photo dans cet album.</p></div>';
        setLoading(false);
        return;
      }
      $gallery.innerHTML = '';
      loadedCount = 0;
      await appendBatch();
      setupScrollObserver();
    } catch (e) {
      setLoading(false);
      $countBadge.textContent = 'Erreur';
      $gallery.innerHTML = `<div class="empty-state"><h2>Impossible de charger l'album</h2><p>${e.message}</p></div>`;
      showToast(`Erreur : ${e.message}`);
    }
  }

  /* ── Gallery event delegation ─────────────────────────── */
  $gallery.addEventListener('click', e => {
    const card = e.target.closest('.photo-card[data-index]');
    if (card) openLightbox(+card.dataset.index);
  });
  $gallery.addEventListener('keydown', e => {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    const card = e.target.closest('.photo-card[data-index]');
    if (card) { e.preventDefault(); openLightbox(+card.dataset.index); }
  });

  /* ── Infinite scroll ──────────────────────────────────── */
  async function appendBatch() {
    if (isLoadingBatch || loadedCount >= allPhotos.length) return;
    isLoadingBatch = true;
    const start = loadedCount;
    const end   = Math.min(start + PAGE_SIZE, allPhotos.length);
    const slice = allPhotos.slice(start, end);

    $gallery.insertAdjacentHTML('beforeend',
      slice.map(() => '<div class="photo-card skeleton"></div>').join('')
    );
    setLoading(true, `Chargement ${end} / ${allPhotos.length}…`);
    try {
      await ensureUrls(slice.map(p => p.photoGuid));
      $gallery.querySelectorAll('.photo-card.skeleton').forEach(s => s.remove());
      $gallery.insertAdjacentHTML('beforeend', slice.map((photo, i) => {
        const urls  = urlCache[photo.photoGuid] || {};
        const isVid = photo.mediaAssetType === 'video';
        const idx   = start + i;
        const alt   = photo.caption || `Photo ${idx + 1}`;
        return `<div class="photo-card" data-index="${idx}" role="button" tabindex="0" aria-label="${alt.replace(/"/g,'&quot;')}">
          ${urls.thumb ? `<img src="${urls.thumb}" alt="" loading="lazy" decoding="async">` : ''}
          ${isVid ? `<span class="video-badge" aria-label="Vidéo"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></span>` : ''}
        </div>`;
      }).join(''));
      loadedCount = end;
    } catch (e) {
      $gallery.querySelectorAll('.photo-card.skeleton').forEach(s => s.remove());
      showToast(`Erreur de chargement : ${e.message}`);
    } finally {
      isLoadingBatch = false;
      setLoading(false);
    }
  }

  function setupScrollObserver() {
    const sentinel = document.getElementById('scroll-sentinel');
    if (!sentinel) return;
    new IntersectionObserver(
      entries => { if (entries[0].isIntersecting) appendBatch(); },
      { rootMargin: '300px' }
    ).observe(sentinel);
  }

  /* ── Lightbox ─────────────────────────────────────────── */
  async function openLightbox(index) {
    lbIndex = index;
    $lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
    history.pushState({ lightbox: true }, '');
    lbPushedHistory = true;
    await loadLbPhoto(index);
  }

  function closeLightbox() {
    $lbVideo.pause();
    $lbVideo.src = '';
    $lbVideo.style.display = 'none';
    $lbImg.src = '';
    $lbImg.style.display = 'block';
    $lightbox.classList.remove('open');
    document.body.style.overflow = '';
    lbIndex = -1;
    if (lbPushedHistory) {
      lbPushedHistory = false;
      history.back();
    }
  }

  async function loadLbPhoto(index) {
    const photo = allPhotos[index];
    if (!photo) return;
    lbIndex = index;

    $lbCounter.textContent = `${index + 1} / ${allPhotos.length}`;
    $lbCaption.textContent = photo.caption || '';
    $lbDate.textContent    = formatDate(photo.dateCreated);
    $lbPrev.hidden = index <= 0;
    $lbNext.hidden = index >= allPhotos.length - 1;

    // Reset both media elements
    $lbVideo.pause();
    $lbVideo.src = '';
    $lbVideo.style.display = 'none';
    $lbImg.classList.add('fading');
    $lbImg.src = '';
    $lbImg.style.display = 'block';

    if (!urlCache[photo.photoGuid]) {
      try { await ensureUrls([photo.photoGuid]); }
      catch (e) { showToast(`Erreur : ${e.message}`); return; }
    }

    const urls   = urlCache[photo.photoGuid] || {};
    const src    = urls.full || urls.thumb || '';
    const isVid  = urls.isVideo || false;
    const ext    = isVid ? '.mp4' : '.jpg';

    if (src) {
      if (isVid) {
        $lbImg.classList.remove('fading');
        $lbImg.style.display = 'none';
        $lbVideo.style.display = 'block';
        $lbVideo.src = src;
        $lbVideo.load();
      } else {
        $lbImg.onload  = () => $lbImg.classList.remove('fading');
        $lbImg.onerror = () => { $lbImg.classList.remove('fading'); showToast("Impossible de charger l'image"); };
        $lbImg.alt = photo.caption || `Photo ${index + 1}`;
        $lbImg.src = src;
      }
    }

    document.getElementById('lb-download-btn').onclick = () => downloadPhoto(src, `vizicloud_${index + 1}${ext}`);
  }

  async function downloadPhoto(url, filename) {
    if (!url) return;
    try {
      const res  = await fetch(url);
      const blob = await res.blob();
      const a    = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: filename });
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 10000);
    } catch (_) {
      window.open(url, '_blank');
    }
  }

  /* ── Settings ─────────────────────────────────────────── */
  function openSettings() {
    $settingsPanel.classList.add('open');
    $settingsOverlay.classList.add('open');
    history.pushState({ panel: 'settings' }, '');
    settingsPushedHistory = true;
  }

  function _closeSettingsUI() {
    $settingsPanel.classList.remove('open');
    $settingsOverlay.classList.remove('open');
  }

  function closeSettings() {
    _closeSettingsUI();
    if (settingsPushedHistory) {
      settingsPushedHistory = false;
      history.back();
    }
  }

  document.getElementById('settings-btn').addEventListener('click', openSettings);
  document.getElementById('settings-close').addEventListener('click', closeSettings);
  $settingsOverlay.addEventListener('click', closeSettings);

  /* ── Lightbox events ──────────────────────────────────── */
  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  document.getElementById('lb-back').addEventListener('click', closeLightbox);

  window.addEventListener('popstate', () => {
    if ($lightbox.classList.contains('open')) {
      lbPushedHistory = false;
      $lbVideo.pause();
      $lbVideo.src = '';
      $lbVideo.style.display = 'none';
      $lbImg.src = '';
      $lbImg.style.display = 'block';
      $lightbox.classList.remove('open');
      document.body.style.overflow = '';
      lbIndex = -1;
    } else if ($settingsPanel.classList.contains('open')) {
      settingsPushedHistory = false;
      _closeSettingsUI();
    }
  });

  $lbPrev.addEventListener('click', () => { if (lbIndex > 0) loadLbPhoto(lbIndex - 1); });
  $lbNext.addEventListener('click', () => { if (lbIndex < allPhotos.length - 1) loadLbPhoto(lbIndex + 1); });

  document.addEventListener('keydown', e => {
    if ($settingsPanel.classList.contains('open') && e.key === 'Escape') { closeSettings(); return; }
    if (!$lightbox.classList.contains('open')) return;
    if (e.key === 'Escape')      closeLightbox();
    if (e.key === 'ArrowLeft'  && lbIndex > 0)                    loadLbPhoto(lbIndex - 1);
    if (e.key === 'ArrowRight' && lbIndex < allPhotos.length - 1) loadLbPhoto(lbIndex + 1);
  });

  // Swipe tactile — inhibé si zoom actif
  $lightbox.addEventListener('touchstart', e => {
    touchIsZoom = e.touches.length > 1;
    if (!touchIsZoom) touchStartX = e.changedTouches[0].clientX;
  }, { passive: true });
  $lightbox.addEventListener('touchmove', e => {
    if (e.touches.length > 1) touchIsZoom = true;
  }, { passive: true });
  $lightbox.addEventListener('touchend', e => {
    if (touchIsZoom) { touchIsZoom = false; return; }
    if ((window.visualViewport?.scale ?? 1) > 1.05) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) < 50) return;
    if (dx < 0 && lbIndex < allPhotos.length - 1) loadLbPhoto(lbIndex + 1);
    if (dx > 0 && lbIndex > 0)                    loadLbPhoto(lbIndex - 1);
  }, { passive: true });

  /* ── Service Worker ───────────────────────────────────── */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(console.warn);
    });
  }

  /* ── Boot ─────────────────────────────────────────────── */
  init();
</script>
</body>
