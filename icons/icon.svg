<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f23"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Cloud shape -->
  <circle cx="178" cy="268" r="72" fill="url(#cloud)"/>
  <circle cx="256" cy="218" r="96" fill="url(#cloud)"/>
  <circle cx="340" cy="268" r="60" fill="url(#cloud)"/>
  <rect x="124" y="268" width="264" height="72" fill="url(#cloud)"/>

  <!-- Camera body -->
  <rect x="170" y="276" width="172" height="124" rx="14" fill="white" opacity="0.95"/>

  <!-- Camera notch -->
  <path d="M215 276 L228 254 L284 254 L297 276 Z" fill="white" opacity="0.95"/>

  <!-- Lens outer -->
  <circle cx="256" cy="338" r="38" fill="#3b82f6"/>
  <!-- Lens inner -->
  <circle cx="256" cy="338" r="24" fill="white" opacity="0.92"/>
  <!-- Lens center -->
  <circle cx="256" cy="338" r="12" fill="#3b82f6"/>

  <!-- Flash dot -->
