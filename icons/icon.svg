<svg width="1024" height="1024" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Icône vizir - ViziCloud</title>
  <desc>Un V stylisé avec deux yeux qui louchent et un nuage iCloud en bouche</desc>

  <style>
    .v-stroke { stroke: #e8c96a; stroke-width: 28; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    .eye-white { fill: #f5f0e8; }
    .eye-iris { fill: #2a6fdb; }
    .eye-pupil { fill: #0a0a15; }
    .eye-shine { fill: white; opacity: 0.85; }
    .beard-main { fill: #c9a84c; }
    .beard-tip { fill: #a0702a; }
  </style>

  <rect width="680" height="680" rx="120" fill="#1a1a2e"/>

  <!-- V à 75% : yeux à x=213/468, pointe à (340,400) -->
  <line x1="213" y1="130" x2="340" y2="400" class="v-stroke"/>
  <line x1="468" y1="130" x2="340" y2="400" class="v-stroke"/>

  <!-- Oeil gauche — iris/pupille décalés +18px vers l'intérieur (louche) -->
  <circle cx="213" cy="130" r="68" fill="#1a1a2e"/>
  <circle cx="213" cy="130" r="62" class="eye-white"/>
  <circle cx="229" cy="146" r="38" class="eye-iris"/>
  <circle cx="229" cy="146" r="22" class="eye-pupil"/>
  <circle cx="213" cy="130" r="66" fill="none" stroke="#e8c96a" stroke-width="5"/>

  <!-- Oeil droit — iris/pupille décalés -18px vers l'intérieur (louche) -->
  <circle cx="468" cy="130" r="68" fill="#1a1a2e"/>
  <circle cx="468" cy="130" r="62" class="eye-white"/>
  <circle cx="452" cy="146" r="38" class="eye-iris"/>
  <circle cx="452" cy="146" r="22" class="eye-pupil"/>
  <circle cx="468" cy="130" r="66" fill="none" stroke="#e8c96a" stroke-width="5"/>

  <!-- Nuage iCloud - bouche (2x taille, remonté, pointe du V dépasse à y=400) -->
  <g id="cloud-mouth">
    <rect x="235" y="328" width="210" height="60" rx="30" fill="#007AFF"/>
    <circle cx="280" cy="328" r="36" fill="#007AFF"/>
    <circle cx="340" cy="302" r="48" fill="#007AFF"/>
    <circle cx="400" cy="328" r="36" fill="#007AFF"/>
    <ellipse cx="326" cy="288" rx="22" ry="12" fill="white" opacity="0.28"/>
  </g>

  <!-- Barbe de vizir - pointe unique -->
  <path d="M310 415 Q340 440 370 415 Q360 480 340 540 Q320 480 310 415 Z" class="beard-main"/>
  <path d="M325 450 Q340 480 355 450 Q348 505 340 540 Q332 505 325 450 Z" class="beard-tip"/>

</svg>
