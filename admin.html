<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d0d0d">
  <title>ViziCloud Admin</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --surface2: #252525;
      --accent: #3b82f6;
      --accent2: #60a5fa;
      --text: #f1f5f9;
      --text-muted: #64748b;
      --border: rgba(255,255,255,0.08);
      --radius: 12px;
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13,13,13,0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0.875rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.875rem;
    }
    .logo {
      font-size: 1.375rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      user-select: none;
    }
    .commit-ref {
      font-size: 0.6rem;
      font-weight: 400;
      font-family: 'Courier New', monospace;
      color: var(--text-muted);
      -webkit-text-fill-color: var(--text-muted);
      margin-left: 0.35rem;
      opacity: 0.65;
      vertical-align: middle;
    }
    .admin-badge {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--warning);
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.28);
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
    }
    .header-link {
      margin-left: auto;
      font-size: 0.8125rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .header-link:hover { color: var(--accent2); }

    /* ── MAIN ── */
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1.125rem;
    }

    /* ── CARDS ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
    }
    .card-title {
      font-size: 0.9375rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    /* ── FORM ── */
    .field { margin-bottom: 0.875rem; }
    .field:last-child { margin-bottom: 0; }
    label {
      display: block;
      font-size: 0.8125rem;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.5625rem 0.75rem;
      font-size: 0.875rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: rgba(59,130,246,0.5); }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover:not(:disabled) { background: #2d2d2d; border-color: rgba(59,130,246,0.35); }
    .btn:disabled { opacity: 0.38; cursor: not-allowed; }
    .btn-primary { background: var(--accent); border-color: transparent; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #2563eb; border-color: transparent; }
    .btn-danger { color: var(--danger); border-color: rgba(239,68,68,0.18); }
    .btn-danger:hover:not(:disabled) { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.35); }
    .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.8rem; }
    .btn-row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }

    /* ── DEPLOY INFO ── */
    .deploy-info {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      line-height: 1.5;
    }
    .deploy-info code {
      font-family: 'Courier New', monospace;
      font-size: 0.8125rem;
      color: var(--accent2);
    }
    .dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-right: 0.4rem;
      vertical-align: middle;
    }
    .dot-green { background: var(--success); }
    .dot-orange { background: var(--warning); }

    /* ── ALBUMS ── */
    .album-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-bottom: 0.875rem;
    }
    .album-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
    }
    .album-info { flex: 1; min-width: 0; }
    .album-name { font-size: 0.9rem; font-weight: 500; }
    .album-token {
      font-size: 0.75rem;
      font-family: 'Courier New', monospace;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-top: 0.15rem;
    }
    .default-badge {
      font-size: 0.68rem;
      font-weight: 600;
      background: rgba(59,130,246,0.12);
      border: 1px solid rgba(59,130,246,0.28);
      color: var(--accent2);
      padding: 0.1rem 0.5rem;
      border-radius: 999px;
      white-space: nowrap;
    }

    /* ── ADD FORM ── */
    .add-form {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      margin-top: 0.75rem;
      display: none;
    }
    .add-form.open { display: block; }
    .add-form-row {
      display: flex;
      gap: 0.625rem;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .add-form-row .field { flex: 1; min-width: 140px; margin-bottom: 0; }

    /* ── PAT NOTE ── */
    .note {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.625rem;
      line-height: 1.5;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      padding: 0.75rem 1.25rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      max-width: min(90vw, 400px);
      text-align: center;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
      white-space: pre-line;
    }
    .toast.show { opacity: 1; }
    .toast-success { background: #16a34a; color: #fff; }
    .toast-error   { background: #dc2626; color: #fff; }
    .toast-info    { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

    /* ── SPINNER ── */
    .spin {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.25);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    hr { border: none; border-top: 1px solid var(--border); margin: 0.875rem 0; }
  </style>
</head>
<body>

<header>
  <span class="logo">
    <img src="icons/icon.svg" alt="" aria-hidden="true"
         style="width:28px;height:28px;vertical-align:middle;margin-right:0.4rem;border-radius:6px;">ViziCloud<span id="commit-ref" class="commit-ref"></span>
  </span>
  <span class="admin-badge">Admin</span>
  <a href="index.html" class="header-link">← App</a>
</header>

<main>

  <!-- ── GitHub Token ── -->
  <div class="card">
    <div class="card-title">🔑 Accès GitHub</div>
    <div class="field">
      <label for="pat-input">Personal Access Token <span style="font-weight:400">(scopes : <code style="font-size:0.8rem;color:var(--accent2)">repo</code> + <code style="font-size:0.8rem;color:var(--accent2)">actions:write</code>)</span></label>
      <input type="password" id="pat-input" placeholder="ghp_…" autocomplete="off">
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="savePat()">Sauvegarder</button>
      <button class="btn btn-danger" onclick="clearPat()">Effacer</button>
      <span id="pat-status" style="font-size:0.8125rem;color:var(--text-muted)"></span>
    </div>
    <p class="note">Stocké uniquement dans le localStorage de votre navigateur — jamais envoyé à un tiers.</p>
  </div>

  <!-- ── Déploiement ── -->
  <div class="card">
    <div class="card-title">🚀 Déploiement</div>
    <div class="deploy-info" id="deploy-info">
      <span><span class="spin"></span> Chargement…</span>
    </div>
    <button class="btn btn-primary" id="btn-deploy" onclick="triggerDeploy()">
      Déclencher un déploiement
    </button>
  </div>

  <!-- ── Albums ── -->
  <div class="card">
    <div class="card-title">📸 Albums</div>
    <div class="album-list" id="album-list">
      <span style="color:var(--text-muted);font-size:0.875rem"><span class="spin"></span> Chargement…</span>
    </div>
    <button class="btn" id="btn-toggle-add" onclick="toggleAddForm()">+ Ajouter un album</button>
    <div class="add-form" id="add-form">
      <div class="add-form-row">
        <div class="field">
          <label for="new-name">Nom</label>
          <input type="text" id="new-name" placeholder="Ex : Vacances 2025">
        </div>
        <div class="field">
          <label for="new-token">Token iCloud</label>
          <input type="text" id="new-token" placeholder="Ex : B0SJtdOXmeCgIG">
        </div>
        <button class="btn btn-primary" onclick="addAlbum()">Ajouter</button>
      </div>
    </div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
'use strict';

const OWNER  = 'JFK-SCIK';
const REPO   = 'ViziCloud';
const BRANCH = 'main';

/* ── PAT ──────────────────────────────────────────────── */
function getPat()  { return localStorage.getItem('vc_admin_pat') || ''; }

function savePat() {
  const v = document.getElementById('pat-input').value.trim();
  if (!v) { toast('Saisir un token', 'error'); return; }
  localStorage.setItem('vc_admin_pat', v);
  document.getElementById('pat-input').value = '';
  document.getElementById('pat-status').textContent = '✓ Token configuré';
  toast('Token sauvegardé', 'success');
  loadDeployInfo();
  loadAlbums();
}

function clearPat() {
  localStorage.removeItem('vc_admin_pat');
  document.getElementById('pat-status').textContent = '';
  toast('Token effacé', 'info');
}

/* ── GitHub API ───────────────────────────────────────── */
async function gh(path, opts = {}) {
  const pat = getPat();
  const headers = { Accept: 'application/vnd.github+json', ...opts.headers };
  if (pat) headers.Authorization = `Bearer ${pat}`;
  const res = await fetch(`https://api.github.com${path}`, { ...opts, headers });
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error(body.message || `HTTP ${res.status}`);
  }
  if (res.status === 204) return null;
  return res.json();
}

/* ── Toast ────────────────────────────────────────────── */
let toastTimer;
function toast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show toast-${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 4500);
}

/* ── Commit ref (version.json) ────────────────────────── */
function loadCommitRef() {
  fetch('./version.json').then(r => r.json()).then(d => {
    if (d?.commit) document.getElementById('commit-ref').textContent = d.commit;
  }).catch(() => {});
}

/* ── Helpers ──────────────────────────────────────────── */
function timeAgo(date) {
  const s = Math.floor((Date.now() - new Date(date)) / 1000);
  if (s < 60)    return `${s}s`;
  if (s < 3600)  return `${Math.floor(s / 60)} min`;
  if (s < 86400) return `${Math.floor(s / 3600)} h`;
  return `${Math.floor(s / 86400)} j`;
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ── Deploy info ──────────────────────────────────────── */
async function loadDeployInfo() {
  const el = document.getElementById('deploy-info');
  try {
    const commit = await gh(`/repos/${OWNER}/${REPO}/commits/${BRANCH}`);
    const sha    = commit.sha.slice(0, 7);
    const msg    = commit.commit.message.split('\n')[0];
    const ago    = timeAgo(commit.commit.author.date);
    el.innerHTML = `
      <span><span class="dot dot-green"></span>GitHub Pages actif</span>
      <span>Dernier commit : <code>${esc(sha)}</code> — ${esc(msg)}</span>
      <span style="color:var(--text-muted);font-size:0.8125rem">Il y a ${ago}</span>`;
  } catch (e) {
    el.innerHTML = `<span style="color:var(--text-muted)">Impossible de charger les infos (${esc(e.message)})</span>`;
  }
}

/* ── Deploy trigger ───────────────────────────────────── */
async function triggerDeploy() {
  const btn = document.getElementById('btn-deploy');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Déclenchement…';
  try {
    await gh(`/repos/${OWNER}/${REPO}/actions/workflows/pages.yml/dispatches`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ref: BRANCH }),
    });
    toast('Déploiement déclenché !\n(mise à jour visible dans ~1 minute)', 'success');
    setTimeout(loadDeployInfo, 4000);
  } catch (e) {
    toast(`Erreur : ${e.message}`, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Déclencher un déploiement';
  }
}

/* ── Albums ───────────────────────────────────────────── */
let albumsSha = null;

async function fetchAlbums() {
  const res = await gh(`/repos/${OWNER}/${REPO}/contents/albums.json`);
  albumsSha  = res.sha;
  return JSON.parse(atob(res.content.replace(/\n/g, '')));
}

async function pushAlbums(albums, message) {
  if (!getPat()) { toast('Token GitHub requis', 'error'); return false; }
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(albums, null, 2) + '\n')));
  await gh(`/repos/${OWNER}/${REPO}/contents/albums.json`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message, content, sha: albumsSha, branch: BRANCH }),
  });
  return true;
}

async function loadAlbums() {
  const el = document.getElementById('album-list');
  try {
    const albums = await fetchAlbums();
    renderAlbums(albums);
  } catch (e) {
    el.innerHTML = `<span style="color:var(--text-muted);font-size:0.875rem">Erreur : ${esc(e.message)}</span>`;
  }
}

function renderAlbums(albums) {
  const el = document.getElementById('album-list');
  if (!albums.length) {
    el.innerHTML = '<span style="color:var(--text-muted);font-size:0.875rem">Aucun album configuré.</span>';
    return;
  }
  el.innerHTML = albums.map((a, i) => `
    <div class="album-item">
      <div class="album-info">
        <div class="album-name">${esc(a.name)} ${a.default ? '<span class="default-badge">défaut</span>' : ''}</div>
        <div class="album-token">${esc(a.id)}</div>
      </div>
      <button class="btn btn-sm" onclick="setDefault(${i})" ${a.default ? 'disabled' : ''}>Défaut</button>
      <button class="btn btn-sm btn-danger" onclick="deleteAlbum(${i})">Supprimer</button>
    </div>`).join('');
}

async function setDefault(index) {
  try {
    const albums = await fetchAlbums();
    albums.forEach((a, i) => { a.default = (i === index); });
    await pushAlbums(albums, `admin: set default album "${albums[index].name}"`);
    toast('Album par défaut mis à jour', 'success');
    await loadAlbums();
  } catch (e) {
    toast(`Erreur : ${e.message}`, 'error');
  }
}

async function deleteAlbum(index) {
  const albums = await fetchAlbums().catch(() => null);
  if (!albums) { toast('Impossible de lire les albums', 'error'); return; }
  const name = albums[index]?.name || '';
  if (!confirm(`Supprimer l'album "${name}" ?`)) return;
  try {
    albums.splice(index, 1);
    await pushAlbums(albums, `admin: remove album "${name}"`);
    toast('Album supprimé', 'success');
    await loadAlbums();
  } catch (e) {
    toast(`Erreur : ${e.message}`, 'error');
  }
}

async function addAlbum() {
  const name  = document.getElementById('new-name').value.trim();
  const token = document.getElementById('new-token').value.trim();
  if (!name || !token) { toast('Nom et token requis', 'error'); return; }
  try {
    const albums = await fetchAlbums();
    albums.push({ id: token, name });
    await pushAlbums(albums, `admin: add album "${name}"`);
    document.getElementById('new-name').value  = '';
    document.getElementById('new-token').value = '';
    toggleAddForm(false);
    toast('Album ajouté !', 'success');
    await loadAlbums();
  } catch (e) {
    toast(`Erreur : ${e.message}`, 'error');
  }
}

function toggleAddForm(force) {
  const el   = document.getElementById('add-form');
  const open = force !== undefined ? force : !el.classList.contains('open');
  el.classList.toggle('open', open);
  document.getElementById('btn-toggle-add').textContent = open ? '✕ Annuler' : '+ Ajouter un album';
}

/* ── Init ─────────────────────────────────────────────── */
if (getPat()) document.getElementById('pat-status').textContent = '✓ Token configuré';
loadCommitRef();
loadDeployInfo();
loadAlbums();
</script>
</body>
</html>
