<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d0d0d">
  <title>ViziCloud Admin</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --surface2: #252525;
      --accent: #3b82f6;
      --accent2: #60a5fa;
      --text: #f1f5f9;
      --text-muted: #64748b;
      --border: rgba(255,255,255,0.08);
      --radius: 12px;
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13,13,13,0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0.875rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.875rem;
    }
    .logo {
      font-size: 1.375rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      user-select: none;
    }
    .commit-ref {
      font-size: 0.6rem;
      font-weight: 400;
      font-family: 'Courier New', monospace;
      color: var(--text-muted);
      -webkit-text-fill-color: var(--text-muted);
      margin-left: 0.35rem;
      opacity: 0.65;
      vertical-align: middle;
    }
    .admin-badge {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--warning);
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.28);
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
    }
    .header-link {
      margin-left: auto;
      font-size: 0.8125rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .header-link:hover { color: var(--accent2); }

    /* ── MAIN ── */
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1.125rem;
    }

    /* ── CARDS ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
    }
    .card-title {
      font-size: 0.9375rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    /* ── FORM ── */
    .field { margin-bottom: 0.875rem; }
    .field:last-child { margin-bottom: 0; }
    label {
      display: block;
      font-size: 0.8125rem;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
    }
    input[type="text"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.5625rem 0.75rem;
      font-size: 0.875rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: rgba(59,130,246,0.5); }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover:not(:disabled) { background: #2d2d2d; border-color: rgba(59,130,246,0.35); }
    .btn:disabled { opacity: 0.38; cursor: not-allowed; }
    .btn-primary { background: var(--accent); border-color: transparent; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #2563eb; border-color: transparent; }
    .btn-danger { color: var(--danger); border-color: rgba(239,68,68,0.18); }
    .btn-danger:hover:not(:disabled) { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.35); }
    .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.8rem; }
    .btn-row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }

    /* ── DEPLOY INFO ── */
    .deploy-info {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      line-height: 1.5;
    }
    .deploy-info code {
      font-family: 'Courier New', monospace;
      font-size: 0.8125rem;
      color: var(--accent2);
    }
    .dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-right: 0.4rem;
      vertical-align: middle;
    }
    .dot-green { background: var(--success); }

    /* ── DEPLOY LOG ── */
    .deploy-log {
      background: #0a0a0a;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem;
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      color: #a3e635;
      white-space: pre-wrap;
      max-height: 160px;
      overflow-y: auto;
      margin-top: 0.75rem;
      display: none;
    }
    .deploy-log.open { display: block; }

    /* ── ALBUMS ── */
    .album-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-bottom: 0.875rem;
    }
    .album-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
    }
    .album-info { flex: 1; min-width: 0; }
    .album-name { font-size: 0.9rem; font-weight: 500; }
    .album-token {
      font-size: 0.75rem;
      font-family: 'Courier New', monospace;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-top: 0.15rem;
    }
    .default-badge {
      font-size: 0.68rem;
      font-weight: 600;
      background: rgba(59,130,246,0.12);
      border: 1px solid rgba(59,130,246,0.28);
      color: var(--accent2);
      padding: 0.1rem 0.5rem;
      border-radius: 999px;
      white-space: nowrap;
    }

    /* ── ADD FORM ── */
    .add-form {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      margin-top: 0.75rem;
      display: none;
    }
    .add-form.open { display: block; }
    .add-form-row {
      display: flex;
      gap: 0.625rem;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .add-form-row .field { flex: 1; min-width: 140px; margin-bottom: 0; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      padding: 0.75rem 1.25rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      max-width: min(90vw, 400px);
      text-align: center;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
      white-space: pre-line;
    }
    .toast.show { opacity: 1; }
    .toast-success { background: #16a34a; color: #fff; }
    .toast-error   { background: #dc2626; color: #fff; }
    .toast-info    { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

    /* ── SPINNER ── */
    .spin {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <span class="logo">
    <img src="icons/icon.svg" alt="" aria-hidden="true"
         style="width:28px;height:28px;vertical-align:middle;margin-right:0.4rem;border-radius:6px;">ViziCloud<span id="commit-ref" class="commit-ref"></span>
  </span>
  <span class="admin-badge">Admin</span>
  <a href="/" class="header-link">← App</a>
</header>

<main>

  <!-- ── Déploiement ── -->
  <div class="card">
    <div class="card-title">🚀 Déploiement</div>
    <div class="deploy-info" id="deploy-info">
      <span><span class="spin"></span> Chargement…</span>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-deploy" onclick="deployNow()">Déployer</button>
      <button class="btn btn-sm" id="btn-log" onclick="toggleLog()" style="display:none">Voir les logs</button>
    </div>
    <pre class="deploy-log" id="deploy-log"></pre>
  </div>

  <!-- ── Albums ── -->
  <div class="card">
    <div class="card-title">📸 Albums</div>
    <div class="album-list" id="album-list">
      <span style="color:var(--text-muted);font-size:0.875rem"><span class="spin"></span> Chargement…</span>
    </div>
    <button class="btn" id="btn-toggle-add" onclick="toggleAddForm()">+ Ajouter un album</button>
    <div class="add-form" id="add-form">
      <div class="add-form-row">
        <div class="field">
          <label for="new-token">Token iCloud</label>
          <input type="text" id="new-token" placeholder="Ex : B0SJtdOXmeCgIG" oninput="onTokenInput()">
        </div>
        <button class="btn btn-primary" onclick="addAlbum()">Ajouter</button>
      </div>
      <div id="token-preview" style="font-size:0.8125rem;color:var(--text-muted);margin-top:0.5rem;min-height:1.2em"></div>
    </div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
'use strict';

const PWD = new URLSearchParams(location.search).get('pwd') || '';
const Q   = PWD ? `?pwd=${encodeURIComponent(PWD)}` : '';

/* ── API ──────────────────────────────────────────────── */
async function api(method, path, body) {
  const opts = { method };
  if (body !== undefined) {
    opts.headers = { 'Content-Type': 'application/json' };
    opts.body    = JSON.stringify(body);
  }
  const res = await fetch(path + Q, opts);
  if (!res.ok) {
    const d = await res.json().catch(() => ({}));
    throw new Error(d.detail || `HTTP ${res.status}`);
  }
  return res.json();
}

/* ── Toast ────────────────────────────────────────────── */
let toastTimer;
function toast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show toast-${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 4500);
}

/* ── Helpers ──────────────────────────────────────────── */
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function timeAgo(dateStr) {
  const s = Math.floor((Date.now() - new Date(dateStr)) / 1000);
  if (s < 60)    return `${s}s`;
  if (s < 3600)  return `${Math.floor(s / 60)} min`;
  if (s < 86400) return `${Math.floor(s / 3600)} h`;
  return `${Math.floor(s / 86400)} j`;
}

/* ── Commit ref ───────────────────────────────────────── */
function loadCommitRef() {
  fetch('./version.json').then(r => r.json()).then(d => {
    if (d?.commit) document.getElementById('commit-ref').textContent = d.commit;
  }).catch(() => {});
}

/* ── Deploy info ──────────────────────────────────────── */
async function loadDeployInfo() {
  const el = document.getElementById('deploy-info');
  try {
    const info = await api('GET', '/admin/info');
    el.innerHTML = `
      <span><span class="dot dot-green"></span>Serveur actif</span>
      <span>Commit déployé : <code>${esc(info.sha)}</code> — ${esc(info.message)}</span>
      <span style="color:var(--text-muted);font-size:0.8125rem">Il y a ${timeAgo(info.date)}</span>`;
  } catch (e) {
    el.innerHTML = `<span style="color:var(--text-muted)">Impossible de charger (${esc(e.message)})</span>`;
  }
}

/* ── Deploy now ───────────────────────────────────────── */
async function deployNow() {
  const btn = document.getElementById('btn-deploy');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Déploiement…';
  try {
    const r = await api('POST', '/deploy/now');
    if (r.up_to_date) {
      toast('Déjà à jour — aucun déploiement nécessaire.', 'info');
    } else {
      toast('Déploiement lancé !\n(~10 secondes)', 'success');
      document.getElementById('btn-log').style.display = '';
      setTimeout(async () => {
        await loadDeployInfo();
        await refreshLog();
      }, 8000);
    }
  } catch (e) {
    toast(`Erreur : ${e.message}`, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Déployer';
  }
}

/* ── Deploy log ───────────────────────────────────────── */
async function refreshLog() {
  try {
    const r = await api('GET', '/admin/deploy/log');
    document.getElementById('deploy-log').textContent = r.log || '(vide)';
  } catch (_) {}
}

function toggleLog() {
  const el  = document.getElementById('deploy-log');
  const btn = document.getElementById('btn-log');
  const open = !el.classList.contains('open');
  el.classList.toggle('open', open);
  btn.textContent = open ? 'Masquer les logs' : 'Voir les logs';
  if (open) refreshLog();
}

/* ── Albums ───────────────────────────────────────────── */
async function loadAlbums() {
  const el = document.getElementById('album-list');
  try {
    const albums = await api('GET', '/admin/albums');
    renderAlbums(albums);
  } catch (e) {
    el.innerHTML = `<span style="color:var(--text-muted);font-size:0.875rem">Erreur : ${esc(e.message)}</span>`;
  }
}

function renderAlbums(albums) {
  const el = document.getElementById('album-list');
  if (!albums.length) {
    el.innerHTML = '<span style="color:var(--text-muted);font-size:0.875rem">Aucun album configuré.</span>';
    return;
  }
  el.innerHTML = albums.map((a, i) => `
    <div class="album-item">
      <div class="album-info">
        <div class="album-name" id="aname-${i}"><span class="spin"></span> ${a.default ? '<span class="default-badge">défaut</span>' : ''}</div>
        <div class="album-token">${esc(a.id)}</div>
      </div>
      <button class="btn btn-sm" onclick="setDefault(${i})" ${a.default ? 'disabled' : ''}>Défaut</button>
      <button class="btn btn-sm btn-danger" onclick="deleteAlbum(${i})">Supprimer</button>
    </div>`).join('');

  albums.forEach((a, i) => {
    fetch(`/api/${encodeURIComponent(a.id)}/webstream`, {
      method: 'POST', body: JSON.stringify({ streamCtag: null }),
    }).then(r => r.json()).then(data => {
      const el = document.getElementById(`aname-${i}`);
      if (!el) return;
      const defaultBadge = a.default ? ' <span class="default-badge">défaut</span>' : '';
      el.innerHTML = esc(data.streamName || a.id) + defaultBadge;
    }).catch(() => {
      const el = document.getElementById(`aname-${i}`);
      if (el) el.innerHTML = esc(a.id) + (a.default ? ' <span class="default-badge">défaut</span>' : '');
    });
  });
}

async function setDefault(index) {
  try {
    const albums = await api('GET', '/admin/albums');
    albums.forEach((a, i) => { a.default = (i === index); });
    await api('POST', '/admin/albums', albums);
    toast('Album par défaut mis à jour', 'success');
    await loadAlbums();
  } catch (e) {
    toast(`Erreur : ${e.message}`, 'error');
  }
}

async function deleteAlbum(index) {
  try {
    const albums = await api('GET', '/admin/albums');
    const name = albums[index]?.name || '';
    if (!confirm(`Supprimer l'album "${name}" ?`)) return;
    albums.splice(index, 1);
    await api('POST', '/admin/albums', albums);
    toast('Album supprimé', 'success');
    await loadAlbums();
  } catch (e) {
    toast(`Erreur : ${e.message}`, 'error');
  }
}

let tokenTimer;
function onTokenInput() {
  clearTimeout(tokenTimer);
  const token = document.getElementById('new-token').value.trim();
  document.getElementById('token-preview').textContent = '';
  if (token.length < 8) return;
  tokenTimer = setTimeout(() => fetchTokenPreview(token), 600);
}

async function fetchTokenPreview(token) {
  const preview = document.getElementById('token-preview');
  preview.innerHTML = '<span class="spin"></span> Vérification…';
  try {
    const res = await fetch(`/api/${encodeURIComponent(token)}/webstream`, {
      method: 'POST', body: JSON.stringify({ streamCtag: null }),
    });
    const data = await res.json();
    if (data.streamName) {
      preview.textContent = `✓ "${data.streamName}" — ${(data.photos || []).length} photo(s)`;
    } else {
      preview.textContent = 'Album trouvé (nom non disponible)';
    }
  } catch (_) {
    preview.textContent = 'Token invalide ou inaccessible';
  }
}

async function addAlbum() {
  const token = document.getElementById('new-token').value.trim();
  if (!token) { toast('Token requis', 'error'); return; }
  try {
    const albums = await api('GET', '/admin/albums');
    albums.push({ id: token });
    await api('POST', '/admin/albums', albums);
    document.getElementById('new-token').value  = '';
    document.getElementById('token-preview').textContent = '';
    toggleAddForm(false);
    toast('Album ajouté !', 'success');
    await loadAlbums();
  } catch (e) {
    toast(`Erreur : ${e.message}`, 'error');
  }
}

function toggleAddForm(force) {
  const el   = document.getElementById('add-form');
  const open = force !== undefined ? force : !el.classList.contains('open');
  el.classList.toggle('open', open);
  document.getElementById('btn-toggle-add').textContent = open ? '✕ Annuler' : '+ Ajouter un album';
}

/* ── Init ─────────────────────────────────────────────── */
loadCommitRef();
loadDeployInfo();
loadAlbums();
</script>
</body>
</html>
